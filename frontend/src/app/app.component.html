<mat-toolbar class="app-toolbar" color="primary">
  <a routerLink="/" class="brand" aria-label="Página inicial do OpenSARC">
    <mat-icon class="brand-icon">event_available</mat-icon>
    <span class="brand-text">Open<strong>SARC</strong></span>
  </a>

  <nav class="app-nav">
    @for (item of navItems(); track item.path) {
      <a
        mat-button
        [routerLink]="item.path"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <span class="spacer"></span>

  @if (isAuthenticated()) {
    <button
      mat-button
      [matMenuTriggerFor]="userMenu"
      class="user-button"
      matTooltip="Conta"
    >
      <span class="avatar">{{ initials() }}</span>
      <span class="user-name">{{ user()?.username }}</span>
      <mat-icon>expand_more</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-header">
        <strong>{{ user()?.username }}</strong>
        <small>{{ user()?.roles?.join(', ') }}</small>
      </div>
      <a mat-menu-item routerLink="/reservas">
        <mat-icon>event_note</mat-icon>
        <span>Minhas reservas</span>
      </a>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
  } @else {
    <a mat-stroked-button routerLink="/cadastro" class="cta-secondary">
      Cadastrar
    </a>
    <a mat-flat-button routerLink="/login" class="cta-primary">
      <mat-icon>login</mat-icon>
      Entrar
    </a>
  }
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
