server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — todas as rotas do Angular resolvem para index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy para o backend. Em produção, troque o host pelo nome do serviço
  # do API Gateway no docker-compose (ex.: http://api-gateway:8080).
  location /auth/ {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /resources/ {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /bookings/ {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Cache de assets estáticos com hash no nome.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
